version: '3.8'
services:
  client:
    build: ./client
    ports:
      - '3000:80'
    depends_on:
      - server
  server:
    build: ./server
    ports:
      - '5000:5000'
    env_file: .env
    depends_on:
      - mongo
  mongo:
    image: mongo:6
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
