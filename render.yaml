services:
  - type: web
    name: nexora-health-api
    env: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: OPENAI_API_KEY
        value: sk-dummy-key-not-required
